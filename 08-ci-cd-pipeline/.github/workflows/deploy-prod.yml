# 本番デプロイ ワークフロー
#
# トリガー: 手動実行 (workflow_dispatch) + 承認ゲート
# 目的: ステージングで検証済みのイメージを本番環境にデプロイ
#
# Why 手動トリガー + 承認:
# - 本番デプロイは意図的なアクションであるべき
# - ステージングでの QA を経てからデプロイする運用フロー
# - 承認ゲートにより、チームの合意なくデプロイされることを防ぐ

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "デプロイするイメージタグ（commit SHA）"
        required: true
        type: string
      skip_approval:
        description: "承認をスキップする（緊急時のみ）"
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: app-production

jobs:
  # ステージングでの稼働確認
  verify-staging:
    name: Verify Staging Health
    runs-on: ubuntu-latest
    steps:
      - name: Health check on staging
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}" || echo "000")
          if [ "${STATUS}" != "200" ]; then
            echo "::error::Staging health check failed (HTTP ${STATUS}). Fix staging before deploying to production."
            exit 1
          fi
          echo "Staging is healthy (HTTP ${STATUS})"

  # 承認ゲート
  approval:
    name: Production Approval
    needs: verify-staging
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_approval }}
    environment:
      name: production
      # GitHub Environment の Protection Rules で承認者を設定
    steps:
      - name: Approved
        run: echo "Production deployment approved"

  # 本番デプロイ
  deploy:
    name: Deploy to Production
    needs: [verify-staging, approval]
    if: ${{ always() && needs.verify-staging.result == 'success' && (needs.approval.result == 'success' || needs.approval.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # 指定タグのイメージが存在することを確認
      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run/${{ env.SERVICE_NAME }}:${{ inputs.image_tag }}"
          gcloud artifacts docker images describe "${IMAGE}" \
            || (echo "::error::Image not found: ${IMAGE}" && exit 1)

      # Cloud Run へデプロイ（段階的ロールアウト）
      - name: Deploy to Cloud Run (Production)
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run/${{ env.SERVICE_NAME }}:${{ inputs.image_tag }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${IMAGE}" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production" \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=20 \
            --tag="release-${{ inputs.image_tag }}"

      # デプロイ後のヘルスチェック
      - name: Post-deploy health check
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}" || echo "000")
            if [ "${STATUS}" = "200" ]; then
              echo "Production is healthy (attempt ${i})"
              exit 0
            fi
            echo "Health check attempt ${i} failed (HTTP ${STATUS}), retrying..."
            sleep 10
          done
          echo "::error::Production health check failed after 5 attempts"
          exit 1

      # デプロイ完了通知
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy ${{ job.status }}: image=${{ inputs.image_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
