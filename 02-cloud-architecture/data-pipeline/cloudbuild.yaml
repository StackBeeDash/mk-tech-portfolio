# Cloud Build 設定
# Cloud Run Jobs へのデプロイパイプライン
#
# トリガー: main ブランチへの push（GitHub連携）
# 手動実行: gcloud builds submit --config=cloudbuild.yaml

substitutions:
  _PROJECT_ID: "your-project-id"
  _REGION: "asia-northeast1"
  _SERVICE_NAME: "data-pipeline"
  _IMAGE_TAG: "${SHORT_SHA}"

steps:
  # Step 1: Docker イメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}:latest"
      - "."
    dir: "02-cloud-architecture/data-pipeline"

  # Step 2: Artifact Registry へプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}"

  # Step 3: Cloud Run Jobs へデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "update"
      - "${_SERVICE_NAME}"
      - "--region=${_REGION}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--max-retries=3"
      - "--task-timeout=3600s"
      - "--memory=1Gi"
      - "--cpu=1"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
